name: Build pour Sideload (Gratuit)
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build_app:
    runs-on: macos-26
    
    steps:
      - name: Checkout du projet
        uses: actions/checkout@v4

      - name: Compiler le dossier .app (Sans Signature)
        run: |
          xcodebuild build \
            -project "FocusFlowrorkmax/FocusFlow.xcodeproj" \
            -scheme "FocusFlow" \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          
          # On déplace le résultat dans un dossier facile à trouver
          mkdir -p build-output
          cp -R build/Build/Products/Debug-iphoneos/*.app build-output/

      - name: Créer l'archive ZIP
        run: zip -r focusflow_Sideload.zip build-output/

      - name: Rendre le fichier disponible au téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: app-pfocusflow-iphone
          path: focusflow_Sideload.zip
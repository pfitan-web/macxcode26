name: Build pour Sideload (Gratuit)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build_app:
    runs-on: macos-26
    
    steps:
      - name: Checkout du projet
        uses: actions/checkout@v4

      - name: Compiler le dossier .app (Sans Signature via Target)
        run: |
          xcodebuild build \
            -project "FocusFlowrorkmax/FocusFlow.xcodeproj" \
            -target "FocusFlow" \
            -sdk iphoneos \
            -configuration Debug \
            SYMROOT="${{ github.workspace }}/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO

      - name: Créer l'archive ZIP
        run: zip -r MonApp_Sideload.zip build/Debug-iphoneos/*.app

      - name: Rendre le fichier disponible au téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: app-pour-mon-iphone
          path: MonApp_Sideload.zip